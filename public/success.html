<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento concluído — Dealwise</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .result-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 4rem 2rem;
      text-align: center;
      gap: 1rem;
    }
    .result-icon { font-size: 3.5rem; line-height: 1; }
    .result-title { font-size: 1.4rem; font-weight: 800; color: var(--text); }
    .result-sub { font-size: 0.9rem; color: var(--muted); max-width: 320px; }
    .result-back {
      margin-top: 0.5rem;
      padding: 0.55rem 1.4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border-radius: 999px;
      text-decoration: none;
      font-size: 0.88rem;
      font-weight: 700;
    }
    .result-back:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <header>
    <div class="header-brand">
      <div class="logo">
        <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="34" height="34" rx="10" fill="url(#lg2)"/>
          <path d="M9 17C9 12.58 12.58 9 17 9C19.5 9 21.74 10.08 23.3 11.82L20.5 14.5C19.68 13.57 18.41 13 17 13C14.79 13 13 14.79 13 17C13 19.21 14.79 21 17 21C18.41 21 19.68 20.43 20.5 19.5L23.3 22.18C21.74 23.92 19.5 25 17 25C12.58 25 9 21.42 9 17Z" fill="white"/>
          <circle cx="25" cy="10" r="3.5" fill="white" fill-opacity="0.85"/>
          <defs>
            <linearGradient id="lg2" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
              <stop stop-color="#5b4fcf"/><stop offset="1" stop-color="#2563eb"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="logo-text">Dealwise</span>
      </div>
    </div>
  </header>

  <main class="result-wrap">
    <div id="status-icon" class="result-icon">⏳</div>
    <p id="status-title" class="result-title">A verificar pagamento...</p>
    <p id="status-sub" class="result-sub"></p>
    <a id="status-back" class="result-back" href="/" style="display:none">Ver anúncios →</a>
  </main>

  <footer>
    <p>Dealwise &middot; <strong>OLX Portugal</strong> e <strong>Facebook Marketplace</strong></p>
  </footer>

  <script>
    (function () {
      const params    = new URLSearchParams(location.search);
      const sessionId = params.get('session_id');
      const icon      = document.getElementById('status-icon');
      const title     = document.getElementById('status-title');
      const sub       = document.getElementById('status-sub');
      const back      = document.getElementById('status-back');

      function showError() {
        icon.textContent  = '❌';
        title.textContent = 'Erro ao verificar pagamento';
        sub.textContent   = 'Se o pagamento foi concluído, o anúncio ficará em destaque em breve. Podes voltar à página principal.';
        back.style.display = '';
      }

      if (!sessionId) { showError(); return; }

      fetch('/api/verify?session_id=' + encodeURIComponent(sessionId))
        .then(r => r.json())
        .then(data => {
          if (data.paid) {
            icon.textContent  = '⭐';
            title.textContent = 'Pagamento confirmado!';
            sub.textContent   = `O teu anúncio está em destaque por ${data.days} ${data.days === 1 ? 'dia' : 'dias'}.`;
          } else {
            icon.textContent  = '⏳';
            title.textContent = 'Pagamento em processamento';
            sub.textContent   = 'Aguarda um momento. O destaque será ativado assim que o pagamento for confirmado.';
          }
          back.style.display = '';
        })
        .catch(showError);
    })();
  </script>
</body>
</html>
