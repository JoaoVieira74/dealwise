<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel da Concessionária — Dealwise</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: #f0f2f5; }

    .portal-header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: .85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .portal-header-right { display: flex; align-items: center; gap: .75rem; }
    .dealer-name-badge {
      font-size: .8rem;
      font-weight: 600;
      color: #065f46;
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      padding: .3rem .75rem;
      border-radius: 999px;
    }
    .portal-nav-link {
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      text-decoration: none;
      padding: .35rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      transition: all .15s;
    }
    .portal-nav-link:hover { border-color: var(--accent); color: var(--accent); }

    .portal-body { max-width: 980px; margin: 0 auto; padding: 1.5rem 2rem 3rem; display: flex; flex-direction: column; gap: 1.5rem; }

    /* Stats bar */
    .portal-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    .portal-stat {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
    }
    .portal-stat-label { font-size: .72rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: .3rem; }
    .portal-stat-value { font-size: 1.6rem; font-weight: 800; color: var(--text); }

    /* Section card */
    .section-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .section-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-title { font-size: .88rem; font-weight: 700; color: var(--text); }

    /* Car list */
    .car-list { display: flex; flex-direction: column; }
    .car-row {
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: .85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .car-row:last-child { border-bottom: none; }
    .car-row:hover { background: #fafbfc; }
    .car-thumb {
      width: 64px;
      height: 48px;
      object-fit: cover;
      border-radius: 6px;
      background: #e9ebee;
      flex-shrink: 0;
    }
    .car-thumb-placeholder {
      width: 64px;
      height: 48px;
      border-radius: 6px;
      background: linear-gradient(135deg, #e9ebee, #dde0e6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
    }
    .car-info { min-width: 0; }
    .car-title { font-size: .88rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .car-meta { font-size: .75rem; color: var(--muted); margin-top: .15rem; display: flex; gap: .6rem; flex-wrap: wrap; }
    .remove-btn {
      flex-shrink: 0;
      padding: .35rem .8rem;
      border: 1.5px solid #fee2e2;
      border-radius: 6px;
      background: transparent;
      color: #ef4444;
      font-size: .75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }
    .remove-btn:hover { background: #fee2e2; }
    .remove-btn.loading { opacity: .5; pointer-events: none; }
    .no-cars { padding: 3rem; text-align: center; color: var(--muted); font-size: .88rem; }

    /* Add car form */
    .add-form { padding: 1.25rem; display: flex; flex-direction: column; gap: .85rem; }
    .add-form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
    .add-form-field { display: flex; flex-direction: column; gap: .3rem; }
    .add-form-field label { font-size: .75rem; font-weight: 600; color: var(--text); }
    .add-form-field input, .add-form-field textarea {
      padding: .55rem .8rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: .85rem;
      color: var(--text);
      background: white;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .add-form-field input:focus, .add-form-field textarea:focus { border-color: var(--accent); }
    .add-form-field textarea { resize: vertical; min-height: 68px; }
    .add-form-hint { font-size: .7rem; color: var(--muted); margin-top: .15rem; }
    .add-form-error { color: #ef4444; font-size: .8rem; display: none; }
    .add-btn {
      align-self: flex-start;
      padding: .6rem 1.4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .add-btn:disabled { opacity: .5; cursor: not-allowed; }
    .add-btn:not(:disabled):hover { opacity: .88; }

    /* Plan badge */
    .plan-badge {
      font-size: .72rem;
      font-weight: 700;
      padding: .2rem .6rem;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .plan-basic    { background: #f3f4f6; color: #374151; }
    .plan-standard { background: #eff6ff; color: #1d4ed8; }
    .plan-premium  { background: #fef9c3; color: #92400e; }

    /* Loading state */
    .portal-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 5rem;
      flex-direction: column;
      gap: 1rem;
      color: var(--muted);
      font-size: .88rem;
    }

    @media (max-width: 700px) {
      .portal-header { padding: .8rem 1rem; }
      .portal-body { padding: 1rem 1rem 2rem; }
      .portal-stats { grid-template-columns: 1fr 1fr; }
      .add-form-row { grid-template-columns: 1fr; }
      .car-row { grid-template-columns: 48px 1fr auto; }
    }
  </style>
</head>
<body>

  <header class="portal-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 34 34" fill="none">
        <rect width="34" height="34" rx="10" fill="url(#p-lg)"/>
        <path d="M9 17C9 12.58 12.58 9 17 9C19.5 9 21.74 10.08 23.3 11.82L20.5 14.5C19.68 13.57 18.41 13 17 13C14.79 13 13 14.79 13 17C13 19.21 14.79 21 17 21C18.41 21 19.68 20.43 20.5 19.5L23.3 22.18C21.74 23.92 19.5 25 17 25C12.58 25 9 21.42 9 17Z" fill="white"/>
        <circle cx="25" cy="10" r="3.5" fill="white" fill-opacity=".85"/>
        <defs>
          <linearGradient id="p-lg" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
            <stop stop-color="#5b4fcf"/><stop offset="1" stop-color="#2563eb"/>
          </linearGradient>
        </defs>
      </svg>
      <span class="logo-text">Dealwise</span>
    </div>
    <div class="portal-header-right">
      <span class="dealer-name-badge" id="dealer-badge">Concessionária</span>
      <a href="/" class="portal-nav-link">Ver anúncios →</a>
    </div>
  </header>

  <div id="portal-root">
    <div class="portal-loading">
      <div class="spinner-ring"></div>
      <p>A carregar o painel…</p>
    </div>
  </div>

  <footer>
    <p>Dealwise &middot; <strong>OLX Portugal</strong> e <strong>Facebook Marketplace</strong></p>
  </footer>

  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const token  = params.get('token');
      const root   = document.getElementById('portal-root');

      if (!token) {
        root.innerHTML = '<div class="portal-loading"><p>Token inválido. <a href="/advertise.html">Subscrever →</a></p></div>';
        return;
      }

      let dealerData = null;

      function esc(s) {
        return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
      }

      function safeHref(url) {
        if (!url) return '#';
        try {
          const u = new URL(url);
          return ['http:','https:','tel:','mailto:'].includes(u.protocol) ? url : '#';
        } catch { return '#'; }
      }

      function renderPlanLabel(plan) {
        const map = { basic: 'Básico', standard: 'Standard', premium: 'Premium' };
        return map[plan] || plan;
      }

      function renderCars(cars, carLimit) {
        if (cars.length === 0) {
          return `<div class="no-cars">Ainda não tens carros publicados. Adiciona o primeiro abaixo!</div>`;
        }
        return `<div class="car-list">${cars.map(c => `
          <div class="car-row" data-car-id="${c.id}">
            ${c.image_url
              ? `<img class="car-thumb" src="${esc(c.image_url)}" alt="${esc(c.title)}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" loading="lazy"><div class="car-thumb-placeholder" style="display:none">🚗</div>`
              : `<div class="car-thumb-placeholder">🚗</div>`
            }
            <div class="car-info">
              <div class="car-title">${esc(c.title)}</div>
              <div class="car-meta">
                ${c.price    ? `<span>${esc(c.price)}</span>` : ''}
                ${c.location ? `<span>📍 ${esc(c.location)}</span>` : ''}
                ${c.contact_url ? `<a href="${esc(safeHref(c.contact_url))}" target="_blank" rel="noopener" style="color:var(--accent)">Contacto ↗</a>` : ''}
              </div>
            </div>
            <button class="remove-btn" data-id="${c.id}">Remover</button>
          </div>
        `).join('')}</div>`;
      }

      function render(dealer, cars) {
        const used     = cars.length;
        const limit    = dealer.car_limit === 9999 ? '∞' : dealer.car_limit;
        const planCls  = `plan-${dealer.plan}`;
        const canAdd   = dealer.car_limit === 9999 || used < dealer.car_limit;

        document.getElementById('dealer-badge').textContent = dealer.company;

        root.innerHTML = `
          <div class="portal-body">

            <div class="portal-stats">
              <div class="portal-stat">
                <div class="portal-stat-label">Carros publicados</div>
                <div class="portal-stat-value">${used} <span style="font-size:1rem;font-weight:500;color:var(--muted)">/ ${limit}</span></div>
              </div>
              <div class="portal-stat">
                <div class="portal-stat-label">Plano atual</div>
                <div class="portal-stat-value" style="font-size:1.1rem;margin-top:.2rem">
                  <span class="plan-badge ${planCls}">${renderPlanLabel(dealer.plan)}</span>
                </div>
              </div>
              <div class="portal-stat">
                <div class="portal-stat-label">Conta</div>
                <div class="portal-stat-value" style="font-size:.9rem;font-weight:600;margin-top:.25rem">${esc(dealer.email)}</div>
              </div>
            </div>

            <div class="section-card">
              <div class="section-header">
                <span class="section-title">Os seus carros</span>
              </div>
              <div id="car-list-wrap">${renderCars(cars, dealer.car_limit)}</div>
            </div>

            <div class="section-card">
              <div class="section-header">
                <span class="section-title">Adicionar carro</span>
                ${!canAdd ? `<span style="font-size:.75rem;color:#ef4444">Limite de carros atingido</span>` : ''}
              </div>
              <form class="add-form" id="add-car-form" ${!canAdd ? 'style="opacity:.5;pointer-events:none"' : ''}>
                <div class="add-form-row">
                  <div class="add-form-field">
                    <label for="car-title">Título *</label>
                    <input type="text" id="car-title" name="title" required placeholder="BMW Série 3 320d Sport Line" maxlength="200" />
                  </div>
                  <div class="add-form-field">
                    <label for="car-price">Preço</label>
                    <input type="text" id="car-price" name="price" placeholder="28 900€" maxlength="50" />
                  </div>
                </div>
                <div class="add-form-row">
                  <div class="add-form-field">
                    <label for="car-location">Localização</label>
                    <input type="text" id="car-location" name="location" placeholder="Lisboa" maxlength="100" />
                  </div>
                  <div class="add-form-field">
                    <label for="car-contact">Link de contacto</label>
                    <input type="url" id="car-contact" name="contact_url" placeholder="https://wa.me/351912345678" maxlength="500" />
                    <span class="add-form-hint">WhatsApp, website ou link de email</span>
                  </div>
                </div>
                <div class="add-form-field">
                  <label for="car-image">URL da imagem</label>
                  <input type="url" id="car-image" name="image_url" placeholder="https://exemplo.com/carro.jpg" maxlength="1000" />
                  <span class="add-form-hint">Link direto para a imagem (JPEG ou PNG). Pode usar Imgur ou outra plataforma de hospedagem.</span>
                </div>
                <div class="add-form-error" id="add-error"></div>
                <button type="submit" class="add-btn" id="add-btn">Publicar carro →</button>
              </form>
            </div>

          </div>
        `;

        // Add car form
        document.getElementById('add-car-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const f      = e.target;
          const btn    = document.getElementById('add-btn');
          const errEl  = document.getElementById('add-error');
          errEl.style.display = 'none';

          const payload = {
            token,
            title:       f.title.value.trim(),
            price:       f.price.value.trim() || null,
            location:    f.location.value.trim() || null,
            image_url:   f.image_url.value.trim() || null,
            contact_url: f.contact_url.value.trim() || null,
          };

          if (!payload.title) {
            errEl.textContent = 'O título é obrigatório.';
            errEl.style.display = 'block';
            return;
          }

          btn.disabled = true;
          btn.textContent = 'A publicar…';

          try {
            const res  = await fetch('/api/dealers/cars', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            const json = await res.json();
            if (json.ok) {
              f.reset();
              await loadPortal();
            } else {
              errEl.textContent = json.error || 'Erro ao adicionar. Tenta novamente.';
              errEl.style.display = 'block';
            }
          } catch {
            errEl.textContent = 'Erro de rede. Tenta novamente.';
            errEl.style.display = 'block';
          } finally {
            btn.disabled = false;
            btn.textContent = 'Publicar carro →';
          }
        });

        // Remove car buttons
        document.getElementById('car-list-wrap').addEventListener('click', async (e) => {
          const btn = e.target.closest('.remove-btn');
          if (!btn) return;
          const id = btn.dataset.id;
          if (!confirm('Remover este carro dos anúncios?')) return;
          btn.classList.add('loading');
          try {
            await fetch(`/api/dealers/cars/${id}`, {
              method: 'DELETE',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ token }),
            });
            await loadPortal();
          } catch {
            btn.classList.remove('loading');
          }
        });
      }

      async function loadPortal() {
        try {
          const res  = await fetch(`/api/dealers/portal?token=${encodeURIComponent(token)}`);
          if (res.status === 403) {
            root.innerHTML = '<div class="portal-loading"><p>Acesso não autorizado. <a href="/advertise.html">Subscrever →</a></p></div>';
            return;
          }
          const data = await res.json();
          dealerData = data;
          render(data.dealer, data.cars);
        } catch {
          root.innerHTML = '<div class="portal-loading"><p>Erro ao carregar. Recarrega a página.</p></div>';
        }
      }

      loadPortal();
    })();
  </script>
</body>
</html>
